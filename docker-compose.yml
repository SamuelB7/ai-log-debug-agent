name: ai-log-debug-agent

services:
  admin-web:
    build:
      context: ./services/admin-web
    command: npm run dev -- --host 0.0.0.0
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./services/admin-web:/app
      - admin_web_node_modules:/app/node_modules
    depends_on:
      backend-api:
        condition: service_started
    networks:
      - debug-agent

  backend-api:
    build:
      context: ./services/backend-api
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && npm run start:dev"
    environment:
      PORT: 3000
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REDIS_URL: ${REDIS_URL}
      AI_AGENT_URL: ${AI_AGENT_URL}
      DOCS_RAG_URL: ${DOCS_RAG_URL}
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      OPENSEARCH_INDEX: ${OPENSEARCH_INDEX}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_OWNER: ${GITHUB_OWNER}
      GITHUB_REPO: ${GITHUB_REPO}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    ports:
      - "3000:3000"
    volumes:
      - ./services/backend-api:/app
      - backend_api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-agent-service:
        condition: service_started
      docs-rag-service:
        condition: service_started
    networks:
      - debug-agent

  log-ingestor:
    build:
      context: ./services/log-ingestor
    command: npm run start:dev
    environment:
      PORT: 3002
      REDIS_URL: ${REDIS_URL}
      LOG_QUEUE_NAME: ${LOG_QUEUE_NAME}
      LOG_INGESTOR_API_KEYS: ${LOG_INGESTOR_API_KEYS}
      LOG_INGESTOR_RATE_LIMIT_WINDOW_SECONDS: ${LOG_INGESTOR_RATE_LIMIT_WINDOW_SECONDS}
      LOG_INGESTOR_RATE_LIMIT_MAX: ${LOG_INGESTOR_RATE_LIMIT_MAX}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    ports:
      - "3002:3002"
    volumes:
      - ./services/log-ingestor:/app
      - log_ingestor_node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - debug-agent

  log-worker:
    build:
      context: ./services/log-worker
    command: npm run dev
    environment:
      REDIS_URL: ${REDIS_URL}
      LOG_QUEUE_NAME: ${LOG_QUEUE_NAME}
      DATABASE_URL: ${DATABASE_URL}
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    volumes:
      - ./services/log-worker:/app
      - log_worker_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    networks:
      - debug-agent

  ai-agent-service:
    build:
      context: ./services/ai-agent-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      BACKEND_API_URL: http://backend-api:3000
      OPENSEARCH_URL: ${OPENSEARCH_URL}
      DOCS_RAG_URL: ${DOCS_RAG_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    ports:
      - "8000:8000"
    volumes:
      - ./services/ai-agent-service:/app
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - debug-agent

  docs-rag-service:
    build:
      context: ./services/docs-rag-service
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      QDRANT_URL: ${QDRANT_URL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    ports:
      - "8001:8001"
    volumes:
      - ./services/docs-rag-service:/app
    depends_on:
      qdrant:
        condition: service_started
    networks:
      - debug-agent

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - debug-agent

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - debug-agent

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      bootstrap.memory_lock: "true"
    ports:
      - "9200:9200"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 20
    networks:
      - debug-agent

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - debug-agent

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "14250:14250"
    networks:
      - debug-agent

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector/config.yaml"]
    volumes:
      - ./infra/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - debug-agent

  prometheus:
    image: prom/prometheus:latest
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      otel-collector:
        condition: service_started
    networks:
      - debug-agent

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_started
    networks:
      - debug-agent

networks:
  debug-agent:
    driver: bridge

volumes:
  admin_web_node_modules:
  backend_api_node_modules:
  log_ingestor_node_modules:
  log_worker_node_modules:
  postgres_data:
  redis_data:
  opensearch_data:
  qdrant_data:
  prometheus_data:
  grafana_data:
